apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-python-app
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-python-app
  template:
    metadata:
      labels:
        app: simple-python-app
  spec:
    containers:
    - name: flask-app
      image: t3chgangsta/simple-python-app:latest # The CI pipeline will update this tag
      ports:
      - containerPort: 80
